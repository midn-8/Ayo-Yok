name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup environment
      run: |
        echo "Setting up..."

    # Example for C / general compile
    - name: Build
      run: |
        make || echo "No Makefile, skipping build"

    # Example test step
    - name: Run tests
      run: |
        ./test.sh || echo "No tests yet"

    - name: Success message
      run: echo "Pipeline completed"
